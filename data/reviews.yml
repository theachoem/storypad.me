- name: "Ballabh Agrawal"
  review_date: "May 5, 2025, 21:02"
  review: >
    Fabulous app to give a voice to your creativity. Simple functions, no hectic things —
    just keep yourself the way you want. Let your words flow. Let your stories speak...
    And there is also an App lock feature using which you can maintain your privacy.
    It has helped me to tackle the billions of thoughts that come in my mind.
    Its features are simple yet the best — you can highlight the text, bold it, tag your
    stories... I strongly recommend this app. I don't have words to praise it. Thanks ♥
