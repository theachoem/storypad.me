- name: "Cody Hansen"
  review_date: "Jul 13, 2026"
  review: >
    It's perfect for my personal needs. I got the premium because it's almost always worth it for me in this case. It's not too complicated but also offers a lot of customization. I think I also appreciate that it isn't overly distracting? It keeps things very straightforward so you don't get lost amongst the weeds, which I feel many apps in general tend to do these days.

- name: "Roselyn Maning"
  review_date: "May 6, 2026"
  review: >
    I've settled for this app after searching through so many diary journal apps. First, because it doesn't contain any ads at all, which I'm so grateful for. Second, I liked the simplicity of the interface. I can add images, emojis, weather, and background wallpaper. It also has a lot of different font styles, which makes the app cooler than any other similar app. Also, I can customize the app's icon! 😍 And the developer gives free stickers online, it's so nice. Thank you for this app! 🥰✨

- name: "Katie Hutton"
  review_date: "Mar 5, 2026"
  review: >
    This app is exactly what I was looking for. I wanted a simple way to journal and do creative writing in one place with better organizational tools than a simple notes app could offer. I also wanted to be able to track moods and symptoms without all the statistics of a mood app, as those can create obsessiveness for me. All basic functionality is available up front. Paid add-ons are very low-cost and feel like a way to thank the devs for their hard work rather than being nickel and dimed.
