<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">

<head>
  {{ partial "head.html" . }}
</head>

<body class="dark:bg-neutral-900 dark:text-neutral-300">
  <header class="sticky top-0 flex flex-row justify-between p-4 max-w-7xl mx-auto px-6">
    <h1
      onclick="if (window.scrollY === 0) { this.classList.remove('animate-shake-vertical'); void this.offsetWidth; this.classList.add('animate-shake-vertical'); } else { window.scrollTo({ top: 0, behavior: 'smooth' }); }"
      class="cursor-pointer">
      {{ site.Title }}</h1>
    <div class="flex flex-row gap-4">
      <a onclick="openStore()" class="cursor-pointer underline">
        Download
      </a>
    </div>
  </header>

  <main class="flex flex-col gap-30">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="border-t pt-10 mt-20 border-t-neutral-300 dark:border-t-neutral-700">
    {{ partial "footer.html" . }}
  </footer>

  <script>
    function openStore() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;

      const isAppleDevice = isIOS || isMac;

      const url = isAppleDevice
        ? 'https://apps.apple.com/us/app/storypad-write-your-story/id6744032172'
        : 'https://play.google.com/store/apps/details?id=com.tc.writestory';

      window.open(url, '_blank');
    }
  </script>
</body>

</html>
