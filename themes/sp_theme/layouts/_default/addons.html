{{ define "main" }}

<div class="max-w-7xl mx-auto px-6">
  <div class="mb-6">
    <nav class="flex items-center gap-2 text-sm text-neutral-600 dark:text-neutral-400 mb-4">
      <a href="{{ "/" | relURL }}" class="hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors">Home</a>
      <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
      </svg>
      <span class="text-neutral-500 dark:text-neutral-500">{{ .Title }}</span>
    </nav>

    <div class="
      /* Layout */ p-6 border rounded-lg mb-8
      /* Style */ border-neutral-200 dark:border-neutral-700 bg-gradient-to-r from-red-50 to-pink-50 dark:from-red-950/10 dark:to-pink-950/10">
      <h1 class="text-4xl font-bold mb-4 text-neutral-900 dark:text-neutral-100">{{ .Title }}</h1>
      <p class="text-lg text-neutral-600 dark:text-neutral-400">{{ .Description }}</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="prose prose-neutral dark:prose-invert max-w-none mb-12">
    {{ .Content }}
  </div>

  <!-- Add-ons Section -->
  {{ partial "addons.html" . }}
</div>

{{ end }}
