<!-- JSON-LD Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://storypad.me/#organization",
      "name": "StoryPad",
      "description": "A timeline-based journaling application for capturing your life story",
      "url": "https://storypad.me",
      "logo": {
        "@type": "ImageObject",
        "url": "https://storypad.me/logo_200x200.png",
        "width": 200,
        "height": 200
      },
      "sameAs": [
        "https://www.tiktok.com/@storypad_timelinediary",
        "https://www.instagram.com/storypad_timelinediary",
        "https://x.com/storypad_app",
        "https://www.youtube.com/@storypad_timelinediary",
        "https://github.com/theachoem/storypad"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "email": "thea@storypad.me",
        "url": "https://storypad.me",
        "availableLanguage": ["en"]
      }
    },
    {
      "@type": "WebSite",
      "@id": "https://storypad.me/#website",
      "url": "https://storypad.me",
      "name": "StoryPad - Timeline Diary",
      "description": "Not another journal app. A timeline for your life. StoryPad lets you capture everything on a single continuous timeline.",
      "publisher": {
        "@id": "https://storypad.me/#organization"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://storypad.me/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "SoftwareApplication",
      "name": "StoryPad",
      "description": "Not another journal app. A timeline for your life. StoryPad lets you capture everything - notes, thoughts, emotions, workouts, travels - on a single continuous timeline. No folders. No tabs. Just your life, beautifully organized.",
      "url": "https://storypad.me",
      "image": "https://storypad.me/og_1200x630.jpg",
      "applicationCategory": "Productivity",
      "applicationSubCategory": "Journaling, Diary, Note-taking",
      "operatingSystem": "iOS, Android",
      "offers": [
        {
          "@type": "Offer",
          "name": "StoryPad - App Store",
          "url": "https://apps.apple.com/us/app/storypad-write-your-story/id6744032172?platform=iphone",
          "priceCurrency": "USD",
          "price": "0",
          "priceValidUntil": "2025-12-31",
          "availability": "https://schema.org/InStock"
        },
        {
          "@type": "Offer",
          "name": "StoryPad - Google Play",
          "url": "https://play.google.com/store/apps/details?id=com.tc.writestory",
          "priceCurrency": "USD",
          "price": "0",
          "priceValidUntil": "2025-12-31",
          "availability": "https://schema.org/InStock"
        }
      ],
      "aggregateOffer": {
        "@type": "AggregateOffer",
        "priceCurrency": "USD",
        "lowPrice": "0",
        "highPrice": "0",
        "offerCount": 2,
        "availability": "https://schema.org/InStock"
      },
      "publisher": {
        "@id": "https://storypad.me/#organization"
      },
      "downloadUrl": [
        "https://apps.apple.com/us/app/storypad-write-your-story/id6744032172?platform=iphone",
        "https://play.google.com/store/apps/details?id=com.tc.writestory"
      ],
      "screenshot": [
        {
          "@type": "ImageObject",
          "url": "https://storypad.me/og_1200x630.jpg",
          "width": 1200,
          "height": 630
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": 3,
        "bestRating": "5",
        "worstRating": "1"
      }
    }
  ]
}
</script>

{{ if eq .Kind "home" }}
<!-- Homepage-specific schema with FAQ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "https://storypad.me/#webpage",
  "url": "https://storypad.me/",
  "name": "{{ .Title }}",
  "description": "{{ .Description }}",
  "isPartOf": {
    "@id": "https://storypad.me/#website"
  },
  "publisher": {
    "@id": "https://storypad.me/#organization"
  },
  "potentialAction": {
    "@type": "ViewAction",
    "target": "https://storypad.me/"
  }
}
</script>

<!-- FAQ Schema for rich snippet -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
{{ range $index, $item := site.Data.questions }}
    {
      "@type": "Question",
      "name": "{{ $item.question | safeJS }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $item.answer | safeJS }}"
      }
    }{{ if ne $index (sub (len site.Data.questions) 1) }},{{ end }}
{{ end }}
  ]
}
</script>
{{ else if .IsSection }}
<!-- Blog/Section-specific schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "@id": "{{ .Permalink }}#webpage",
  "url": "{{ .Permalink }}",
  "name": "{{ .Title }}",
  "description": "{{ .Description }}",
  "isPartOf": {
    "@id": "https://storypad.me/#website"
  },
  "publisher": {
    "@id": "https://storypad.me/#organization"
  }
}
</script>
{{ else }}
<!-- Content page schema with enhanced metadata -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "@id": "{{ .Permalink }}#article",
  "url": "{{ .Permalink }}",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "image": {
    "@type": "ImageObject",
    "url": "https://storypad.me/og_1200x630.jpg",
    "width": 1200,
    "height": 630
  },
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Organization",
    "@id": "https://storypad.me/#organization"
  },
  "publisher": {
    "@id": "https://storypad.me/#organization"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "inLanguage": "en",
  "keywords": "{{ if .Keywords }}{{ delimit .Keywords ", " }}{{ end }}storypad, timeline diary, digital journal"
}
</script>
{{ end }}
