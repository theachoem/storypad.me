baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'StoryPad'
theme = 'sp_theme'

enableRobotsTXT = true

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[minify]
  minifyOutput = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'