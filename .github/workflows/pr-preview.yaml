# Build Hugo preview for Pull Requests
name: PR Preview - Build Hugo Site

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

# Sets permissions for the workflow
permissions:
  contents: read
  pull-requests: write  # To post comments on PRs

# Allow concurrent PR preview builds
concurrency:
  group: "pr-preview-${{ github.event.number }}"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job for PR preview
  build-preview:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.5
      HUGO_ENVIRONMENT: preview
      TZ: America/Los_Angeles
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      
      - name: Cache Restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: hugo-pr-${{ github.event.number }}-${{ github.sha }}
          restore-keys: |
            hugo-pr-${{ github.event.number }}-
            hugo-
      
      - name: Configure Git
        run: git config core.quotepath false
      
      - name: Build Hugo site for preview
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://storypad.me" \
            --cacheDir "${{ runner.temp }}/hugo_cache" \
            --environment preview
      
      - name: Cache Save
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
      
      - name: Package preview site
        run: |
          cd public
          tar -czf ../pr-preview-${{ github.event.number }}.tar.gz .
          cd ..
          echo "Preview site packaged successfully"
          echo "Total files in preview: $(find public -type f | wc -l)"
          echo "Preview package size: $(du -h pr-preview-${{ github.event.number }}.tar.gz | cut -f1)"
      
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: |
            pr-preview-${{ github.event.number }}.tar.gz
            public/
          retention-days: 30
          compression-level: 6
      
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Check if we already commented
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🚀 PR Preview Ready')
            );

            const prNumber = context.issue.number;
            const runId = context.runId;
            const sha = context.sha.substring(0, 7);
            
            const commentBody = `🚀 **PR Preview Ready**

            A preview build has been generated for this pull request!

            **📦 Preview Details:**
            - **PR:** #${prNumber}
            - **Commit:** \`${sha}\`
            - **Build:** [View logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})

            **📥 How to view the preview:**
            1. Go to the [Actions tab](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})
            2. Scroll down to "Artifacts" section
            3. Download \`pr-preview-${prNumber}\`
            4. Extract the archive and open \`index.html\` in your browser

            **🔄 This comment will be updated when new commits are pushed to this PR.**

            ---
            *Generated by PR Preview workflow*`;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }