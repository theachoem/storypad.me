# Deploy Hugo preview for Pull Requests
name: PR Preview - Deploy Preview Site

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

# Sets permissions for the workflow
permissions:
  contents: read
  pull-requests: write  # To post comments on PRs

# Allow concurrent PR preview builds
concurrency:
  group: "pr-preview-${{ github.event.number }}"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build and deploy job for PR preview
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.5
      HUGO_ENVIRONMENT: preview
      TZ: America/Los_Angeles
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      
      - name: Cache Restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: hugo-pr-${{ github.event.number }}-${{ github.sha }}
          restore-keys: |
            hugo-pr-${{ github.event.number }}-
            hugo-
      
      - name: Configure Git
        run: git config core.quotepath false
      
      - name: Build Hugo site for preview
        run: |
          hugo \
            --gc \
            --minify \
            --cacheDir "${{ runner.temp }}/hugo_cache" \
            --environment preview
      
      - name: Cache Save
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
      
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './public'
          production-branch: develop
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview for PR #${{ github.event.number }} - ${{ github.event.pull_request.title }}"
          alias: pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        id: netlify
      
      - name: Comment on PR (Success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Check if we already commented
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('🚀 PR Preview Ready') || comment.body.includes('❌ PR Preview Failed'))
            );

            const prNumber = context.issue.number;
            const runId = context.runId;
            const sha = context.sha.substring(0, 7);
            const previewUrl = "${{ steps.netlify.outputs.deploy-url }}";
            
            const commentBody = `🚀 **PR Preview Ready**

            A live preview has been deployed for this pull request!

            **🔗 [👀 View Preview](${previewUrl})**

            **📦 Preview Details:**
            - **PR:** #${prNumber}
            - **Commit:** \`${sha}\`
            - **Preview URL:** ${previewUrl}
            - **Build:** [View logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})

            **🔄 This comment will be updated when new commits are pushed to this PR.**

            ---
            *Generated by PR Preview workflow*`;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Comment on PR (Failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Check if we already commented
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('🚀 PR Preview Ready') || comment.body.includes('❌ PR Preview Failed'))
            );

            const prNumber = context.issue.number;
            const runId = context.runId;
            const sha = context.sha.substring(0, 7);
            
            const commentBody = `❌ **PR Preview Failed**

            The preview deployment failed for this pull request.

            **🔍 Debug Information:**
            - **PR:** #${prNumber}
            - **Commit:** \`${sha}\`
            - **Build Logs:** [View logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})

            **🛠️ Next Steps:**
            1. Check the [build logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}) for error details
            2. Fix any Hugo build errors or deployment issues in your changes
            3. Push a new commit to trigger a new preview deployment

            **🔄 This comment will be updated when new commits are pushed to this PR.**

            ---
            *Generated by PR Preview workflow*`;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }